<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | My portfolio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 30px;
            margin-bottom: 40px;
        }

        .terminal-header {
            color: var(--accent);
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin: 0 0 20px 0;
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            margin-right: 20px;
            border: 1px solid var(--accent);
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .links a:hover {
            background-color: var(--accent);
            color: var(--bg-color);
        }

        section {
            margin-bottom: 40px;
        }

        h2 {
            color: var(--accent);
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .card-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .tag {
            display: inline-block;
            background-color: var(--bg-color);
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 5px;
            margin-top: 10px;
            border: 1px solid var(--border);
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="terminal-header">Contact</div>
            <h1> </h1>
            <p class="tagline"> </p>
            <div class="links">
                <a href="index.html">Home</a>
            </div>
        </header>
        
<section id="contact">
    <h2> Contact Me</h2>

    <div class="card">
    <div class="card-title">Email</div>
    <p>
        <a href="mailto:usmansikandermirza@gmail.com" style="color: var(--accent);">
            usmansikandermirza@gmail.com
        </a>
    </p>
</div>

<div class="card">
    <div class="card-title">GitHub</div>
    <p>
        <a href="https://github.com/usman747" target="_blank" style="color: var(--accent);">
            github.com/usman747
        </a>
    </p>
</div>

<div class="card">
    <div class="card-title">LinkedIn</div>
    <p>
        <a href="https://linkedin.com/in/yourprofile" target="_blank" style="color: var(--accent);">
            linkedin.com/in/yourprofile
        </a>
    </p>
</div>
      
  

    </div>
</section>

    </div>

</body>
</html>
