<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills | My portfolio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 30px;
            margin-bottom: 40px;
        }

        .terminal-header {
            color: var(--accent);
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin: 0 0 20px 0;
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            margin-right: 20px;
            border: 1px solid var(--accent);
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .links a:hover {
            background-color: var(--accent);
            color: var(--bg-color);
        }

        section {
            margin-bottom: 40px;
        }

        h2 {
            color: var(--accent);
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .card-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .tag {
            display: inline-block;
            background-color: var(--bg-color);
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 5px;
            margin-top: 10px;
            border: 1px solid var(--border);
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="terminal-header">Skills</div>
            <h1> </h1>
            <p class="tagline"> </p>
            <div class="links">
                <a href="index.html">Home</a> <!-- Clickable link back to homepage -->
            </div>
        </header>

<section id="skills">
    <h2 class="section-title">Skills</h2>

    <div class="skills-container">

        <div class="skill-card">
            <h3>Cloud & Infrastructure</h3>
            <div class="skill-tags">
                <span>Azure</span>
                <span>Microsoft 365</span>
                <span>Intune</span>
                <span>Entra ID</span>
                <span>Exchange Online</span>
            </div>
        </div>

        <div class="skill-card">
            <h3>Collaboration</h3>
            <div class="skill-tags">
                <span>Teams</span>
                <span>SharePoint</span>
                <span>OneDrive</span>
                <span>Power Platform</span>
            </div>
        </div>

        <div class="skill-card">
            <h3>Automation</h3>
            <div class="skill-tags">
                <span>PowerShell</span>
                <span>Power Automate</span>
                <span>Python</span>
                <span>Git</span>
            </div>
        </div>

        <div class="skill-card">
            <h3>Languages</h3>
            <div class="skill-tags">
                <span>English</span>
                <span>German</span>
                <span>Urdu</span>
            </div>
        </div>

    </div>
</section>

</body>
</html>
